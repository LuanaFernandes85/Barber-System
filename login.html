<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Barber System</title>

  <link rel="stylesheet" href="login.css">

  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
</head>

<body>

<div class="login-container">

  <div class="login-card">

    <div class="logo">
      ✂ Barber
    </div>

    <p class="subtitle">Sistema profissional para barbearias</p>

    <input id="login-email" type="email" placeholder="Seu e-mail">

    <input id="login-senha" type="password" placeholder="Sua senha">

    <button class="btn-primary" onclick="fazerLogin()">Entrar</button>

    <button class="btn-secondary" onclick="fazerCadastro()">Criar conta</button>

    <p class="erro" id="erro"></p>

  </div>

</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script src="login.js"></script>

</body>
</html>
