<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Painel Admin</title>

  <style>
    body {
      background: #0f172a;
      color: #fff;
      font-family: Arial;
      padding: 20px;
    }

    h1 {
      margin-bottom: 20px;
    }

    .card {
      background: #1e293b;
      padding: 15px;
      border-radius: 10px;
      margin-bottom: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .btn {
      padding: 6px 12px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      margin-left: 5px;
    }

    .btn-green {
      background: #22c55e;
      color: #000;
    }

    .btn-red {
      background: #ef4444;
      color: #fff;
    }
    .btn-sair {
    display: block;
    width: 100%;
    max-width: 200px;
    margin: 30px auto;
    padding: 12px;
    background: #475569;
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-weight: bold;
    transition: background 0.3s;
}

.btn-sair:hover {
    background: #ef4444; 
}

    .status-ok { color: #22c55e; }
    .status-exp { color: #ef4444; }
  </style>
</head>

<body>

<h1>Painel de Clientes</h1>


<div id="lista"></div>



<button onclick="sairAdmin()" class="btn-sair">
    <i class="fas fa-sign-out-alt"></i> Sair do Painel
</button>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script src="admin.js"> </script>

</body>
</html>
